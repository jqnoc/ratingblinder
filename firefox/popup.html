<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 260px;
            padding: 1.2rem;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
            font-size: 14px;
            color: #333;
            background: #fafafa;
        }
        h1 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            color: #222;
        }
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-top: 1px solid #e5e5e5;
            border-bottom: 1px solid #e5e5e5;
        }
        .toggle-label {
            font-weight: 500;
        }
        /* Toggle switch */
        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            inset: 0;
            background: #ccc;
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.25s;
        }
        .slider::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.25s;
            box-shadow: 0 1px 3px rgba(0,0,0,.2);
        }
        input:checked + .slider {
            background: #FF5F00;
        }
        input:checked + .slider::before {
            transform: translateX(20px);
        }
        .status {
            font-size: 0.82rem;
            color: #999;
            margin-top: 0.75rem;
            text-align: center;
            transition: color 0.2s;
        }
        .status.active {
            color: #FF5F00;
        }
        .hint {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 0.5rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>⭐ Rating Blinder</h1>

    <div class="toggle-row">
        <span class="toggle-label">Hide ratings</span>
        <label class="switch">
            <input type="checkbox" id="toggle" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="status active" id="status">Ratings are hidden</div>
    <div class="hint">Toggle applies to all open tabs</div>

    <script src="popup.js"></script>
</body>
</html>
